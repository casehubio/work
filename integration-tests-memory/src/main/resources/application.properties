# Ephemeral deployment — dummy H2 datasource satisfies Hibernate build-time validation.
# No schema is created (generation=none, Flyway disabled). All actual persistence goes
# through casehub-work-persistence-memory @Alternative @Priority(100) in-memory stores.
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:ephemeral-it;DB_CLOSE_DELAY=-1
quarkus.hibernate-orm.schema-management.strategy=drop-and-create
quarkus.flyway.enabled=false
quarkus.scheduler.start-mode=halted

# WorkItems defaults
casehub.work.default-expiry-hours=24
casehub.work.default-claim-hours=4
casehub.work.cleanup.expiry-check-seconds=60

quarkus.arc.exclude-types=io.casehub.platform.mock.MockGroupMembershipProvider
