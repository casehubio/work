# Use random port to avoid TIME_WAIT conflicts between QuarkusTest classes
quarkus.http.test-port=0

# H2 in-memory datasource for tests
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
quarkus.hibernate-orm.database.generation=none
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=classpath:db/work/migration

# Keep Quartz Scheduler bean available for programmatic timer management (WorkItemTimerService).
# start-mode=halted prevents @Scheduled methods from auto-firing in tests;
# they only run if explicitly triggered.
quarkus.scheduler.start-mode=halted

# WorkItems config (use short values for deadline tests)
casehub.work.default-expiry-hours=24
casehub.work.default-claim-hours=4
casehub.work.cleanup.expiry-check-seconds=60

# casehub-platform is runtime scope (needed for MockPreferenceProvider in production build),
# which brings MockGroupMembershipProvider into CDI scan — exclude it to avoid ambiguity
# with NoOpGroupMembershipProvider (@DefaultBean) in tests.
quarkus.arc.exclude-types=io.casehub.platform.mock.MockGroupMembershipProvider
