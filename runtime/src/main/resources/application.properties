# CaseHub Work extension defaults
# casehub.work.default-expiry-hours=24
# casehub.work.default-claim-hours=4
# casehub.work.cleanup.expiry-check-seconds=60

# Flyway Java migration locations — includes Java migration classes alongside SQL migrations
quarkus.flyway.locations=classpath:db/work/migration,classpath:io/casehub/work/runtime/migration

# casehub-platform runtime scope brings MockGroupMembershipProvider into augmentation scan
# — exclude it to avoid ambiguity with NoOpGroupMembershipProvider (@DefaultBean).
quarkus.arc.exclude-types=io.casehub.platform.mock.MockGroupMembershipProvider
