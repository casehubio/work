quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:testdb;MODE=PostgreSQL
quarkus.hibernate-orm.database.generation=none
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=classpath:db/work/migration
quarkus.http.test-port=0
casehub.work.issue-tracker.github.webhook-secret=test-webhook-secret
casehub.work.issue-tracker.jira.webhook-secret=test-jira-secret
# casehub-platform is runtime scope (needed for MockPreferenceProvider in production build),
# which brings MockGroupMembershipProvider into CDI scan — exclude it to avoid ambiguity
# with NoOpGroupMembershipProvider (@DefaultBean) in tests.
quarkus.arc.exclude-types=io.casehub.platform.mock.MockGroupMembershipProvider
