# Random port prevents TIME_WAIT conflicts when multiple @QuarkusTest classes restart Quarkus
quarkus.http.test-port=0
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:ledgertest;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
quarkus.hibernate-orm.database.generation=none
quarkus.flyway.migrate-at-start=true
# casehub-ledger#95 moved ledger base migrations to db/ledger/migration/ (ledger_entry,
# ledger_attestation, actor_trust_score tables). Both paths must be listed so Flyway
# creates the base tables before V2001__work_item_ledger_entry.sql runs.
quarkus.flyway.locations=classpath:db/work/migration,classpath:db/ledger/migration
quarkus.scheduler.start-mode=halted
casehub.work.default-expiry-hours=24
casehub.work.default-claim-hours=4
casehub.work.cleanup.expiry-check-seconds=60
casehub.ledger.enabled=true
casehub.ledger.hash-chain.enabled=true
casehub.ledger.decision-context.enabled=true
casehub.ledger.evidence.enabled=true
casehub.ledger.attestations.enabled=true
casehub.ledger.trust-score.enabled=true
# Map the "qhorus" named persistence unit to the default test datasource
# (TrustScoreJob and LedgerVerificationService use @PersistenceUnit("qhorus"))

# casehub-platform is runtime scope (needed for MockPreferenceProvider in production build),
# which brings MockGroupMembershipProvider into CDI scan — exclude it to avoid ambiguity
# with NoOpGroupMembershipProvider (@DefaultBean) in tests.
quarkus.arc.exclude-types=io.casehub.platform.mock.MockGroupMembershipProvider,io.casehub.ledger.runtime.service.identity.**
# The casehub-ledger identity enricher beans inject DIDResolver and AgentCredentialValidator
# which are not available in the casehub-work-ledger test context (casehub-platform-identity
# no-ops are not indexed here). These enrichers are not exercised by casehub-work-ledger tests;
# excluding them avoids unsatisfied dependency failures. See casehub-platform#N to add Jandex
# to casehub-platform-api so the no-ops are properly discoverable everywhere.
