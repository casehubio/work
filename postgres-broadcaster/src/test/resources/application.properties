# Datasource is provided entirely by PostgresBroadcasterTestResource at runtime.
# These stubs prevent Quarkus augmentation from complaining about missing config.
quarkus.datasource.db-kind=postgresql
quarkus.datasource.devservices.enabled=false

# Random port prevents TIME_WAIT conflicts when multiple @QuarkusTest classes run
quarkus.http.test-port=0

# Short cache TTL so tests don't see stale cached events
quarkus.cache.caffeine."default".expire-after-write=1S

# Prevent @Scheduled jobs from running during tests
quarkus.scheduler.enabled=false

# casehub-platform is runtime scope (needed for MockPreferenceProvider in production build),
# which brings MockGroupMembershipProvider into CDI scan — exclude it to avoid ambiguity
# with NoOpGroupMembershipProvider (@DefaultBean) in tests.
quarkus.arc.exclude-types=io.casehub.platform.mock.MockGroupMembershipProvider
