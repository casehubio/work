# quarkus-work-queues-examples/src/main/resources/application.properties
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:queues-examples;DB_CLOSE_DELAY=-1
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=classpath:db/work/migration
casehub.work.default-expiry-hours=168
casehub.work.default-claim-hours=24
quarkus.http.test-port=0
