quarkus.http.test-port=0
quarkus.arc.remove-unused-beans=false
quarkus.quartz.store-type=ram

# Index library JARs for CDI bean discovery (artifact-ids post casehub-engine-* rename)
quarkus.index-dependency.engine-common.group-id=io.casehub
quarkus.index-dependency.engine-common.artifact-id=casehub-engine-common
quarkus.index-dependency.engine.group-id=io.casehub
quarkus.index-dependency.engine.artifact-id=casehub-engine
quarkus.index-dependency.blackboard.group-id=io.casehub
quarkus.index-dependency.blackboard.artifact-id=casehub-engine-blackboard
quarkus.index-dependency.scheduler-quartz.group-id=io.casehub
quarkus.index-dependency.scheduler-quartz.artifact-id=casehub-engine-scheduler-quartz
quarkus.index-dependency.persistence-memory.group-id=io.casehub
quarkus.index-dependency.persistence-memory.artifact-id=casehub-engine-persistence-memory
# casehub-platform-expression contains JQEvaluator as an @ApplicationScoped CDI bean.
# Library JARs are not auto-indexed — must be listed explicitly. See PP-20260522-bbd139.
quarkus.index-dependency.platform-expression.group-id=io.casehub
quarkus.index-dependency.platform-expression.artifact-id=casehub-platform-expression
quarkus.index-dependency.platform-api.group-id=io.casehub
quarkus.index-dependency.platform-api.artifact-id=casehub-platform-api
quarkus.index-dependency.platform.group-id=io.casehub
quarkus.index-dependency.platform.artifact-id=casehub-platform
quarkus.index-dependency.work-api.group-id=io.casehub
quarkus.index-dependency.work-api.artifact-id=casehub-work-api
quarkus.index-dependency.work-core.group-id=io.casehub
quarkus.index-dependency.work-core.artifact-id=casehub-work-core
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:test;MODE=PostgreSQL
quarkus.hibernate-orm.schema-management.strategy=drop-and-create
# Suppress named query validation errors from casehub-ledger artifact schema drift
quarkus.hibernate-orm.unsupported-properties."hibernate.query.validate_named_queries"=false
# Exclude JpaWorkItemStore so InMemoryWorkItemStore (@Alternative @Priority(1)) is the sole
# active WorkItemStore — required for test assertions via workItemStore.scanAll().
quarkus.arc.exclude-types=io.casehub.work.runtime.repository.jpa.JpaWorkItemStore,\
  io.casehub.work.runtime.repository.jpa.JpaWorkItemTemplateStore,\
  io.casehub.work.runtime.service.JpaWorkloadProvider,\
  io.casehub.work.runtime.service.TenantScopedPrincipal,\
  io.casehub.platform.mock.MockCurrentPrincipal,\
  io.casehub.platform.mock.MockGroupMembershipProvider,\
  io.casehub.platform.mock.MockPreferenceProvider
quarkus.arc.selected-alternatives=\
  io.casehub.persistence.memory.InMemoryCaseInstanceRepository,\
  io.casehub.persistence.memory.InMemoryReactiveCaseInstanceRepository,\
  io.casehub.persistence.memory.InMemoryCaseMetaModelRepository,\
  io.casehub.persistence.memory.InMemoryReactiveCaseMetaModelRepository,\
  io.casehub.persistence.memory.InMemoryEventLogRepository,\
  io.casehub.persistence.memory.InMemoryReactiveEventLogRepository,\
  io.casehub.persistence.memory.InMemorySubCaseGroupRepository,\
  io.casehub.persistence.memory.InMemoryReactiveSubCaseGroupRepository,\
  io.casehub.persistence.memory.InMemoryPlanItemStore,\
  io.casehub.work.memory.InMemoryWorkItemStore,\
  io.casehub.work.memory.InMemoryWorkItemTemplateStore,\
  io.casehub.ledger.testing.NoOpLedgerEntryRepository,\
  io.casehub.ledger.testing.NoOpReactiveLedgerEntryRepository,\
  io.casehub.work.engine.NoOpPreferenceProvider
