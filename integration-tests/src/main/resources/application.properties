# Integration test app — embedded in the packaged artifact
# H2 in-memory datasource for JVM and native integration tests
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:workitems-it;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
quarkus.hibernate-orm.database.generation=none
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=classpath:db/work/migration
quarkus.scheduler.start-mode=halted

# WorkItems defaults
casehub.work.default-expiry-hours=24
casehub.work.default-claim-hours=4
casehub.work.cleanup.expiry-check-seconds=60

# casehub-platform runtime scope brings MockGroupMembershipProvider into augmentation scan
# — exclude it to avoid ambiguity with NoOpGroupMembershipProvider (@DefaultBean).
quarkus.arc.exclude-types=io.casehub.platform.mock.MockGroupMembershipProvider
