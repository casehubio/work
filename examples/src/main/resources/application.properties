# Datasource — H2 in-memory, survives JVM lifetime
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:workitems-examples;DB_CLOSE_DELAY=-1
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=classpath:db/work/migration,classpath:db/ledger/migration

# WorkItem defaults
casehub.work.default-expiry-hours=168
casehub.work.default-claim-hours=24

# Ledger — all features enabled
casehub.ledger.enabled=true
casehub.ledger.hash-chain.enabled=true
casehub.ledger.decision-context.enabled=true
casehub.ledger.evidence.enabled=true
casehub.ledger.attestations.enabled=true
casehub.ledger.trust-score.enabled=true
casehub.ledger.trust-score.decay-half-life-days=90

# casehub-platform runtime scope brings MockGroupMembershipProvider into augmentation scan
# — exclude it to avoid ambiguity with NoOpGroupMembershipProvider (@DefaultBean).
quarkus.arc.exclude-types=io.casehub.platform.mock.MockGroupMembershipProvider
# Select the JPA @Alternative for ActorTrustScoreRepository — without this,
# the @DefaultBean NoOpActorTrustScoreRepository silently swallows all writes.
quarkus.arc.selected-alternatives=io.casehub.ledger.runtime.repository.jpa.JpaActorTrustScoreRepository
