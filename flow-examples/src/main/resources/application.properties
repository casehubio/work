# H2 in-memory datasource
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:work-flow-examples;DB_CLOSE_DELAY=-1
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=classpath:db/work/migration

# Disable scheduler — examples drive everything via REST
quarkus.scheduler.enabled=false

# WorkItem defaults
casehub.work.default-expiry-hours=168
casehub.work.default-claim-hours=24

# casehub-platform runtime scope brings MockGroupMembershipProvider into augmentation scan
# — exclude it to avoid ambiguity with NoOpGroupMembershipProvider (@DefaultBean).
quarkus.arc.exclude-types=io.casehub.platform.mock.MockGroupMembershipProvider
